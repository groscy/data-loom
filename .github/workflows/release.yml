name: release

# Build the standalone executable and publish it to a GitHub Release on version tags.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build standalone executable
        run: npm run package

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash build/DataLoom.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  DataLoom.exe" | Set-Content -Path build/DataLoom.exe.sha256 -Encoding ascii
          Write-Host "SHA-256: $hash"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/DataLoom.exe
            build/DataLoom.exe.sha256
          fail_on_unmatched_files: true

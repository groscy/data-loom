<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>DataLoom application architecture</title>
<desc>Three external sources (openspec CLI, Claude MCP config, openspec workspace) feed a single loopback daemon whose subsystems derive the roadmap and discover MCP topology, serve a browser dashboard and MCP clients, and write dependency edits back to the workspace. A CLI and lifecycle layer manages the daemon.</desc>
<style>
  svg{--tp:#1a1a1a;--ts:#57534e;--box:#f5f4f2;--boxs:#d6d3ce;--blue:#e7effd;--blues:#4b7bd6;--teal:#e0f2ef;--teals:#2f9e91;--arr:#6b6b6b;--ctl:#9a9a9a;}
  @media (prefers-color-scheme:dark){svg{--tp:#e9e9e6;--ts:#a8a6a1;--box:#26262b;--boxs:#3c3c43;--blue:#1c2a46;--blues:#5f8ad8;--teal:#123331;--teals:#3aab9d;--arr:#8f8f8f;--ctl:#6f6f6f;}}
  .t{font-size:14px;fill:var(--tp);}
  .th{font-size:14px;font-weight:500;fill:var(--tp);}
  .ts{font-size:12px;fill:var(--ts);}
  .box{fill:var(--box);stroke:var(--boxs);stroke-width:1.2;}
  .nblue{fill:var(--blue);stroke:var(--blues);stroke-width:1.2;}
  .nteal{fill:var(--teal);stroke:var(--teals);stroke-width:1.2;}
  .arr{stroke:var(--arr);stroke-width:1.5;fill:none;}
  .ctl{stroke:var(--ctl);stroke-width:1.5;fill:none;}
  .ahp{fill:none;stroke:var(--arr);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .ahpc{fill:none;stroke:var(--ctl);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
</style>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="ahp" d="M2 1L8 5L2 9"/></marker>
<marker id="ahc" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="ahpc" d="M2 1L8 5L2 9"/></marker>
</defs>

<rect class="nblue" x="40" y="26" width="14" height="12" rx="2"/>
<text class="ts" x="60" y="36">daemon internals</text>
<rect class="nteal" x="210" y="26" width="14" height="12" rx="2"/>
<text class="ts" x="230" y="36">live consumers</text>
<rect class="box" x="360" y="26" width="14" height="12" rx="2"/>
<text class="ts" x="380" y="36">sources &amp; state</text>

<rect class="box" x="40" y="58" width="184" height="48" rx="8"/>
<text class="th" x="132" y="80" text-anchor="middle">openspec CLI</text>
<text class="ts" x="132" y="96" text-anchor="middle">external · not bundled</text>
<rect class="box" x="248" y="58" width="184" height="48" rx="8"/>
<text class="th" x="340" y="80" text-anchor="middle">Claude MCP config</text>
<text class="ts" x="340" y="96" text-anchor="middle">~/.claude.json</text>
<rect class="box" x="456" y="58" width="184" height="48" rx="8"/>
<text class="th" x="548" y="80" text-anchor="middle">openspec/ workspace</text>
<text class="ts" x="548" y="96" text-anchor="middle">read &amp; written live</text>

<line class="arr" x1="132" y1="106" x2="132" y2="144" marker-end="url(#ah)"/>
<line class="arr" x1="340" y1="106" x2="340" y2="144" marker-end="url(#ah)"/>
<line class="arr" x1="548" y1="106" x2="548" y2="144" marker-end="url(#ah)"/>

<rect class="box" x="40" y="146" width="600" height="190" rx="12"/>
<text class="th" x="64" y="170">DataLoom daemon</text>
<text class="ts" x="64" y="187">Node · loopback 127.0.0.1:4317</text>

<rect class="nblue" x="56" y="198" width="272" height="52" rx="8"/>
<text class="th" x="192" y="222" text-anchor="middle">roadmap derivation</text>
<text class="ts" x="192" y="238" text-anchor="middle">watch → derive → model</text>
<rect class="nblue" x="352" y="198" width="272" height="52" rx="8"/>
<text class="th" x="488" y="222" text-anchor="middle">MCP discovery</text>
<text class="ts" x="488" y="238" text-anchor="middle">servers + passive liveness</text>
<rect class="nblue" x="56" y="262" width="272" height="52" rx="8"/>
<text class="th" x="192" y="286" text-anchor="middle">HTTP + WebSocket server</text>
<text class="ts" x="192" y="302" text-anchor="middle">serves SPA, pushes state</text>
<rect class="nblue" x="352" y="262" width="272" height="52" rx="8"/>
<text class="th" x="488" y="286" text-anchor="middle">MCP server /mcp</text>
<text class="ts" x="488" y="302" text-anchor="middle">Streamable-HTTP · tools</text>

<text class="ts" x="638" y="186" text-anchor="end">writes ## Depends On</text>

<line class="arr" x1="192" y1="336" x2="192" y2="382" marker-end="url(#ah)"/>
<text class="ts" x="210" y="362">HTTP + WS</text>
<line class="arr" x1="488" y1="336" x2="488" y2="382" marker-end="url(#ah)"/>
<text class="ts" x="506" y="362">MCP tools</text>

<rect class="nteal" x="56" y="384" width="272" height="52" rx="8"/>
<text class="th" x="192" y="408" text-anchor="middle">browser dashboard</text>
<text class="ts" x="192" y="424" text-anchor="middle">roadmap + topology tabs</text>
<rect class="nteal" x="352" y="384" width="272" height="52" rx="8"/>
<text class="th" x="488" y="408" text-anchor="middle">MCP clients</text>
<text class="ts" x="488" y="424" text-anchor="middle">Claude Code · Desktop</text>

<path class="arr" d="M624 288 L648 288 L648 82 L642 82" stroke-dasharray="5 4" marker-end="url(#ah)"/>

<line class="ctl" x1="340" y1="464" x2="340" y2="340" stroke-dasharray="4 4" marker-end="url(#ahc)"/>
<text class="ts" x="400" y="360">manages</text>

<rect class="box" x="40" y="466" width="600" height="50" rx="10"/>
<text class="th" x="340" y="490" text-anchor="middle">CLI &amp; lifecycle</text>
<text class="ts" x="340" y="506" text-anchor="middle">up · start · stop · autostart · connect · tray</text>
</svg>
